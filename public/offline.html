<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#080402" />
    <title>FcuK Academia</title>
    <style>
      :root {
        color-scheme: dark;
        --background: #080402;
        --surface: #15100d;
        --border: rgba(245, 162, 79, 0.24);
        --text: #fff6ee;
        --text-muted: #d7baa5;
        --accent: #f5a24f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: system-ui, sans-serif;
        background:
          radial-gradient(circle at top, rgba(245, 162, 79, 0.18), transparent 28%),
          linear-gradient(180deg, #080402 0%, #110907 100%);
        color: var(--text);
      }

      main {
        width: min(100%, 26rem);
        border: 1px solid var(--border);
        border-radius: 28px;
        padding: 24px;
        background: rgba(21, 16, 13, 0.92);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
      }

      p {
        margin: 0;
      }

      .kicker {
        color: var(--accent);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.24em;
        text-transform: uppercase;
      }

      h1 {
        margin: 12px 0 0;
        font-size: clamp(2rem, 8vw, 3rem);
        line-height: 0.94;
        text-transform: lowercase;
      }

      .copy {
        margin-top: 16px;
        line-height: 1.7;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <main>
      <p class="kicker">offline mode</p>
      <h1>you&apos;re offline.</h1>
      <p class="copy">Reconnect to pull fresh attendance, marks, and timetable data. The app shell still opens, but live SRM sync needs the internet.</p>
    </main>
  </body>
</html>
